components:
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-Partner-Key
      description: 'Partner API key.'
    hmacAuth:
      type: apiKey
      in: header
      name: X-Signature
      description: 'HMAC signature for request verification.'
    tenantHeader:
      type: apiKey
      in: header
      name: X-Tenant-ID
      description: 'Tenant identifier (e.g. world.test.localhost). Required for all tenant-scoped routes; falls back to Host-header tenant resolution when omitted.'
  schemas:
    ValidationError:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: 'Validation failed'
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
    FindVirtualAccountByReferenceRequest:
      type: object
      properties:
        customer_reference:
          maxLength: 100
          type: string
          minLength: 1
      required:
        - customer_reference
    IndexPartnerTransactionRequest:
      type: object
      properties:
        type:
          enum:
            - va_creation
            - nip_inward
            - fee_charge
            - wallet_fund
            - withdrawal
            - refund
            - adjustment
            - manual_credit
          type: string
          description: 'Optional field (included only when present in request)'
        status:
          type: string
          description: 'Optional field (included only when present in request)'
        from:
          type: string
          format: date
          description: 'Optional field (included only when present in request)'
        to:
          type: string
          format: date
          description: 'Optional field (included only when present in request)'
        reference:
          maxLength: 255
          type: string
          description: 'Optional field (included only when present in request)'
        session_id:
          maxLength: 255
          type: string
          description: 'Optional field (included only when present in request)'
        virtual_account_id:
          type: string
          format: uuid
          description: 'Optional field (included only when present in request)'
        per_page:
          minimum: 1
          maximum: 100
          type: integer
          description: 'Optional field (included only when present in request)'
    InitiateWithdrawalRequest:
      type: object
      properties:
        amount:
          minimum: 100
          maximum: 100000000000
          type: integer
        destination_account:
          pattern: '^\d{10}$'
          minLength: 10
          maxLength: 10
          type: string
        destination_bank:
          minLength: 3
          maxLength: 3
          type: string
        narration:
          nullable: true
          maxLength: 100
          type: string
      required:
        - amount
        - destination_account
        - destination_bank
    FeePreviewRequest:
      type: object
      properties:
        amount:
          minimum: 100
          maximum: 100000000000
          type: integer
      required:
        - amount
    OnboardManagedCustomerRequest:
      type: object
      properties:
        bvn:
          pattern: '^\d{11}$'
          type: string
          minLength: 1
        nin:
          nullable: true
          pattern: '^\d{11}$'
          type: string
          description: 'Required when: tier,2,3'
        first_name:
          maxLength: 255
          type: string
          minLength: 1
        last_name:
          maxLength: 255
          type: string
          minLength: 1
        phone:
          maxLength: 32
          type: string
          minLength: 1
        email:
          nullable: true
          maxLength: 255
          type: string
          format: email
        date_of_birth:
          type: string
          format: date
          minLength: 1
        gender:
          nullable: true
          enum:
            - male
            - female
            - other
          type: string
        address:
          nullable: true
          maxLength: 500
          type: string
          description: 'Required when: tier,3'
        tier:
          enum:
            - 1
            - 2
            - 3
          type: integer
        customer_reference:
          nullable: true
          maxLength: 255
          type: string
      required:
        - bvn
        - first_name
        - last_name
        - phone
        - date_of_birth
        - tier
    ManagedCustomerLifecycleRequest:
      type: object
      properties:
        reason:
          nullable: true
          maxLength: 500
          type: string
    OpenManagedAccountRequest:
      type: object
      properties:
        product_id:
          type: string
          format: uuid
          minLength: 1
        nickname:
          nullable: true
          maxLength: 255
          type: string
      required:
        - product_id
    GenerateManagedStatementRequest:
      type: object
      properties:
        from:
          type: string
          format: date
          minLength: 1
        to:
          type: string
          format: date
          minLength: 1
      required:
        - from
        - to
    IssueManagedCardRequest:
      type: object
      properties:
        nickname:
          nullable: true
          maxLength: 100
          type: string
          description: 'Optional field (included only when present in request)'
        limits:
          type: object
          description: 'Optional field (included only when present in request)'
          properties:
            daily_pos:
              minimum: 0
              type: integer
              description: 'Optional field (included only when present in request)'
            daily_atm:
              minimum: 0
              type: integer
              description: 'Optional field (included only when present in request)'
            daily_web:
              minimum: 0
              type: integer
              description: 'Optional field (included only when present in request)'
